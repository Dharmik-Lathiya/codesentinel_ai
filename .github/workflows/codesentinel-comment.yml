name: CodeSentinel AI

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codesentinel:
    if: >
      startsWith(github.event.comment.body, '/review') ||
      startsWith(github.event.comment.body, '/fix') ||
      startsWith(github.event.comment.body, '/audit') ||
      startsWith(github.event.comment.body, '/score') ||
      startsWith(github.event.comment.body, '/testgen') ||
      startsWith(github.event.comment.body, '/gate') ||
      startsWith(github.event.comment.body, '/deadcode')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - name: Extract command
        id: cmd
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const match = body.match(/^\/(review|fix|audit|score|testgen|gate|deadcode)\b/i);
            if (!match) { core.setFailed('No valid command'); return; }
            core.setOutput('mode', match[1].toLowerCase());

      - name: Get target ref
        id: target
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.issue.pull_request) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: context.issue.number
              });
              core.setOutput('ref', pr.head.sha);
              core.setOutput('base_ref', pr.base.ref);
              core.setOutput('head_ref', pr.head.ref);
            } else {
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner, repo: context.repo.repo
              });
              core.setOutput('ref', repo.default_branch);
              core.setOutput('base_ref', repo.default_branch);
              core.setOutput('head_ref', '');
            }

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0

      - name: Checkout CodeSentinel
        uses: actions/checkout@v4
        with:
          repository: Dharmik-Lathiya/CodeSentinel_AI
          path: codesentinel
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build CodeSentinel
        working-directory: codesentinel
        run: npm install && npm run build

      - name: Loading comment
        id: loading
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔄 **CodeSentinel** is reviewing... please wait.'
            });
            core.setOutput('comment_id', comment.id);

      - name: Run CodeSentinel
        id: run
        env:
          GITHUB_BASE_REF: ${{ steps.target.outputs.base_ref }}
          GITHUB_HEAD_REF: ${{ steps.target.outputs.head_ref }}
        run: |
          FLAGS=""
          if [ "${{ steps.cmd.outputs.mode }}" = "fix" ]; then FLAGS="--auto-fix"; fi
          node codesentinel/dist/index.js ${{ steps.cmd.outputs.mode }} $FLAGS 2>&1 | tee /tmp/cs-out.txt; true

      - name: Update comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mode = '${{ steps.cmd.outputs.mode }}';
            const MAX_BODY = 63000;
            let body = '### CodeSentinel — ' + mode + '\n\n';
            let logs = '';
            try { logs = fs.readFileSync('/tmp/cs-out.txt','utf8'); } catch {}
            try {
              const report = JSON.parse(fs.readFileSync('codesentinel-reports/codesentinel-' + mode + '.json', 'utf8'));
              if (report.summary) {
                let summary = report.summary;
                if (summary.length > 50000) summary = summary.slice(0, 50000) + '\n\n_… truncated …_';
                body += summary;
              }
            } catch {
              if (logs) {
                let trimmed = logs.trim();
                if (trimmed.length > 50000) trimmed = trimmed.slice(0, 50000) + '\n… truncated';
                body += '```\n' + trimmed + '\n```';
              }
            }
            const logSection = '\n\n<details><summary>Raw logs</summary>\n\n```\n' + (logs.length > 10000 ? logs.trim().slice(0, 10000) + '\n…' : logs.trim()) + '\n```\n\n</details>';
            if ((body + logSection).length < MAX_BODY) body += logSection;
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: ${{ steps.loading.outputs.comment_id }},
              body: body
            });
