name: AI Self Review & Audit

on:
  pull_request:
    types: [opened, synchronize, labeled, closed]
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      audit_category:
        description: 'Specific audit category (omit for random)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: self-review-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}-${{ github.actor }}
  cancel-in-progress: false

jobs:
  review:
    if: |
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch' &&
      github.event.action != 'closed' &&
      !startsWith(github.event.pull_request.head.ref, 'autofix/') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
      (
        (
          github.event_name == 'pull_request' &&
          (
            github.actor != 'github-actions[bot]' &&
            !endsWith(github.actor, '[bot]')
          ) ||
          contains(github.event.pull_request.labels.*.name, 'self-improvement')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body || '', '/review')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}
      - uses: ./action
        with:
          mode: review
          github_token: ${{ secrets.GITHUB_TOKEN }}
          opencode_base_url: ${{ vars.OPENCODE_BASE_URL }}
          opencode_api_key: ${{ vars.OPENCODE_API_KEY }}

  autofix:
    concurrency:
      group: autofix-loop-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    if: |
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch' &&
      github.event.action != 'closed' &&
      (
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'autofix') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:ready')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body || '', '/fix')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build
        run: npm install && npm run build
      - uses: ./action
        with:
          mode: fix
          max_fix_iterations: 3
          github_token: ${{ secrets.GITHUB_TOKEN }}
          opencode_base_url: ${{ vars.OPENCODE_BASE_URL }}
          opencode_api_key: ${{ vars.OPENCODE_API_KEY }}

  scheduled-review:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./action
        with:
          mode: review
          github_token: ${{ secrets.GITHUB_TOKEN }}
          opencode_base_url: ${{ vars.OPENCODE_BASE_URL }}
          opencode_api_key: ${{ vars.OPENCODE_API_KEY }}

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true
          gh label create "autofix-trigger" --force --color "c2e0c6" --description "Triggers autofix workflow on issues" 2>/dev/null || true
      - uses: ./action
        with:
          mode: audit
          audit_create_issues: true
          audit_auto_fix: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          opencode_base_url: ${{ vars.OPENCODE_BASE_URL }}
          opencode_api_key: ${{ vars.OPENCODE_API_KEY }}

  fix-issue:
    if: |
      github.event.issue.pull_request == null && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '/fix'))
        ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'autofix-trigger'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true
          gh label create "autofix:ready" --force --color "0e8a16" --description "Approved — ready to merge" 2>/dev/null || true
          gh label create "autofix:needs-manual-review" --force --color "d93f0b" --description "Max iterations reached" 2>/dev/null || true
      - uses: ./action
        with:
          mode: fix
          max_fix_iterations: 1
          github_token: ${{ secrets.GITHUB_TOKEN }}
          opencode_base_url: ${{ vars.OPENCODE_BASE_URL }}
          opencode_api_key: ${{ vars.OPENCODE_API_KEY }}

  auto-merge:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'autofix:ready'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Merging PR #${PR_NUMBER} (autofix:ready)..."
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --auto || {
            echo "::warning::Auto-merge failed — PR #${PR_NUMBER} may need manual merge"
          }

  notify-merged:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autofix:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post merge notification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BODY="## ✅ Merged to Main
          PR #${PR_NUMBER} has been merged.
          All autofix issues were resolved and the review agent approved this PR.
          ---
          *🤖 Posted automatically by CodeSentinel AI*"
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$BODY"
      - name: Update labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "autofix:ready" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --add-label "autofix:merged" 2>/dev/null || true
