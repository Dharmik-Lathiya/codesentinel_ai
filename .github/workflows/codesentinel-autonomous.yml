name: CodeSentinel Autonomous Improvement

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "24"

jobs:
  auto-improve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        run: npm install && npm run build

      - name: Auto-Fix Issues
        run: |
          node dist/index.js review 2>&1 || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "CodeSentinel Bot"
            git config user.email "bot@codesentinel.dev"
            git add -A
            git commit -m "CodeSentinel: auto-fix issues [skip ci]"
            git push
          else
            echo "No changes from auto-fix"
          fi

      - name: Generate Feature
        id: feature-gen
        run: |
          MINUTE=$(date +%M)
          # Only generate features every 30 minutes (:00 and :30)
          if [[ $((10#$MINUTE % 30)) -ne 0 && "${{ github.event_name }}" == "schedule" ]]; then
            echo "Skipping feature generation (minute ${MINUTE} not divisible by 30)"
            echo "generated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Deterministic rotation: (day_of_year + hour) % 3
          DAY_OF_YEAR=$(date +%j)
          HOUR=$(date +%H)
          TYPE_INDEX=$(( (10#$DAY_OF_YEAR + 10#$HOUR) % 3 ))
          case $TYPE_INDEX in
            0) TYPE="test" ;;
            1) TYPE="util" ;;
            2) TYPE="doc" ;;
          esac
          echo "type=${TYPE}" >> $GITHUB_OUTPUT
          node dist/index.js improve --improve-type ${TYPE} 2>&1 || true
          echo "generated=true" >> $GITHUB_OUTPUT

      - name: Create Feature PR
        if: ${{ steps.feature-gen.outputs.generated == 'true' }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            TIMESTAMP=$(date +%Y%m%d%H%M)
            BRANCH="codesentinel/improve/${TIMESTAMP}"
            TYPE="${{ steps.feature-gen.outputs.type }}"
            git config user.name "CodeSentinel Bot"
            git config user.email "bot@codesentinel.dev"
            git checkout -b "${BRANCH}"
            git add -A
            git commit -m "CodeSentinel: ${TYPE} improvement [skip ci]"
            git push origin "${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "CodeSentinel: ${TYPE} improvement - ${TIMESTAMP}" \
              --body "Automated ${TYPE} improvement generated by CodeSentinel autonomous scheduler."
          else
            echo "No changes from feature generation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
