name: Auto Version & Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Override bump type (auto-detected from commits if empty)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  OPENCODE_BASE_URL: ${{ vars.OPENCODE_BASE_URL }}
  OPENCODE_API_KEY: ${{ vars.OPENCODE_API_KEY }}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      bump_type: ${{ steps.analyze.outputs.bump_type }}
      commit_count: ${{ steps.check.outputs.commit_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=100" >> "$GITHUB_OUTPUT"
            echo "No tags yet — will create initial release"
          else
            COUNT=$(git rev-list "$LAST_TAG..HEAD" --count 2>/dev/null || echo 0)
            echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
            if [ "$COUNT" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "Found $COUNT new commit(s) since $LAST_TAG"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No new commits since $LAST_TAG — skipping"
            fi
          fi
      - name: Auto-detect bump type from commits
        id: analyze
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BUMP="${{ inputs.bump_type }}"
          if [ -n "$BUMP" ]; then
            echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
            echo "Using manual override: $BUMP"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              echo "bump_type=minor" >> "$GITHUB_OUTPUT"
              echo "No prior tag — bumping minor"
            else
              LOG=$(git log "$LAST_TAG..HEAD" --oneline 2>/dev/null)
              if echo "$LOG" | grep -qi "breaking\|major\|!:"; then
                echo "bump_type=major" >> "$GITHUB_OUTPUT"
                echo "Detected breaking changes — major bump"
              elif echo "$LOG" | grep -qi "feat\|feature\|add\|new"; then
                echo "bump_type=minor" >> "$GITHUB_OUTPUT"
                echo "Detected new features — minor bump"
              else
                echo "bump_type=patch" >> "$GITHUB_OUTPUT"
                echo "Detected fixes/chores — patch bump"
              fi
            fi
          fi

  fix:
    needs: [detect]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build
        run: npm ci && npm run build
      - name: Auto-fix issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node dist/index.js fix --auto-fix 2>&1 | tee /tmp/cs-out.txt; true
      - name: Commit fixes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "CodeSentinel Bot"
            git config user.email "bot@codesentinel.ai"
            git add -A
            git commit -m "chore: auto-fix issues [skip ci]"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
            echo "Fixes committed"
          else
            echo "No fixes to commit"
          fi

  version:
    needs: [detect, fix]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure git
        run: |
          git config user.name "CodeSentinel Bot"
          git config user.email "bot@codesentinel.ai"
      - name: Pull latest (from fix phase commits)
        run: |
          git pull --rebase origin main
      - name: Bump version
        id: bump
        env:
          BUMP: ${{ needs.detect.outputs.bump_type }}
        run: |
          npm version $BUMP --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json 2>/dev/null || true
          git commit -m "chore: bump to v$VERSION [skip ci]"
          # Clean up tag if it exists from a previous failed run
          git tag -d "v$VERSION" 2>/dev/null || true
          git push origin --delete "v$VERSION" 2>/dev/null || true
          git tag "v$VERSION"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main --tags
          echo "Released v$VERSION"

  release:
    needs: [version, detect]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull latest (version commit + tag)
        run: |
          git pull --rebase origin main
          git fetch --tags origin
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "$PREV_TAG..HEAD" 2>/dev/null | grep -v '\[skip ci\]' || echo "No significant changes")
          else
            LOG="Initial release"
          fi
          NOTES="## v$VERSION
          Bump type: ${{ needs.detect.outputs.bump_type }}
          Commits since last tag: ${{ needs.detect.outputs.commit_count }}

          ## What's Changed
          $LOG
          ---
          _🤖 Automated release by CodeSentinel AI_"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          gh release create "v$VERSION" \
            --repo "${{ github.repository }}" \
            --title "v$VERSION" \
            --notes "${{ steps.notes.outputs.notes }}"
